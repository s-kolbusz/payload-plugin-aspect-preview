name: Release

# Publishes to npm when a v* tag is pushed:
#   npm version patch && git push --follow-tags
#
# Auth is via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. The package's
# trusted-publisher config on npmjs.com must point at this repo + this workflow
# file (release.yml). Provenance is attached automatically.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Trusted publishing needs npm >= 11.5.1; node 22 ships npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # prepublishOnly rebuilds, so publish the already-verified tree. No token
      # env — npm mints a short-lived OIDC credential from the id-token above.
      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts

      # Mirror the tag to a GitHub Release, using this version's CHANGELOG
      # section as the body (falls back to auto-generated notes if absent).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > NOTES.md
          if [ -s NOTES.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file NOTES.md --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
