name: Release

# Publishes to npm when a v* tag is pushed:
#   npm version patch && git push --follow-tags
#
# Requires a repo secret NPM_TOKEN — an npm "Automation" access token
# (Automation tokens bypass 2FA, which is required for CI publishing).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # Skip publishing (but still validate the tag) when no token is set —
      # e.g. releases published manually. Set the NPM_TOKEN secret to enable
      # automated publishing on tag push.
      - name: Detect npm token
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "HAS_TOKEN=true" >> "$GITHUB_ENV"
          else
            echo "HAS_TOKEN=false" >> "$GITHUB_ENV"
            echo "::notice::NPM_TOKEN not set — validating the tag but skipping npm publish."
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # prepublishOnly rebuilds, so publish the already-verified tree.
      - name: Publish to npm
        if: env.HAS_TOKEN == 'true'
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
